AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Alertrix Lambda + API Gateway backend

Parameters:
  FirebaseServiceAccountJson:
    Type: String
    Default: ""
    NoEcho: true
    Description: Firebase service account JSON string used by Lambda to send FCM.
  FirebaseServiceAccountJsonBase64:
    Type: String
    Default: ""
    NoEcho: true
    Description: Base64-encoded Firebase service account JSON for safer CLI parameter passing.
  FirebaseServiceAccountParamName:
    Type: String
    Default: /alertrix/firebase/service-account-b64
    Description: SSM parameter name used by Lambda to load Firebase service account (base64).
  AlertFromEmail:
    Type: String
    Default: ""
    Description: Verified SES sender email used for registration verification codes.
  EmailCooldownSeconds:
    Type: Number
    Default: 86400
    Description: Cooldown window in seconds for repeated alert emails of same zone+severity.
  AlertCooldownSeconds:
    Type: Number
    Default: 30
    Description: Cooldown window in seconds for repeated alerts and push notifications of same zone+severity.
  ThresholdConfigParam:
    Type: String
    Default: ""
    Description: Optional SSM parameter name that stores threshold JSON.
  EmergencyAgency:
    Type: String
    Default: ""
    Description: Optional emergency agency display name.
  OfflineWindowSeconds:
    Type: Number
    Default: 120
    Description: Device considered offline if heartbeat exceeds this interval.
  IoTSensorTopic:
    Type: String
    Default: alertrix/sensors/ingest
    Description: MQTT topic consumed by AWS IoT Core rule for sensor ingest.

Conditions:
  HasFirebaseServiceAccountB64: !Not [!Equals [!Ref FirebaseServiceAccountJsonBase64, ""]]

Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        SENSOR_TABLE_NAME: !Ref SensorTable
        ALERT_TABLE_NAME: !Ref AlertTable
        INCIDENT_TABLE_NAME: !Ref IncidentTable
        SENSOR_EVENT_TABLE_NAME: !Ref SensorEventTable
        WORK_ORDER_TABLE_NAME: !Ref WorkOrderTable
        PUSH_TOKEN_TABLE_NAME: !Ref PushTokenTable
        SETTINGS_TABLE_NAME: !Ref SettingsTable
        USER_PROFILE_TABLE_NAME: !Ref UserProfileTable
        AUTH_USER_TABLE_NAME: !Ref AuthUserTable
        VERIFICATION_CODE_TABLE_NAME: !Ref VerificationCodeTable
        ADMIN_TABLE_NAME: !Ref AdminTable
        ALERT_CRITICAL_TOPIC_ARN: !Ref AlertCriticalTopic
        ALERT_WARNING_TOPIC_ARN: !Ref AlertWarningTopic
        HEARTBEAT_TOPIC_ARN: !Ref HeartbeatTopic
        ALERT_FROM_EMAIL: !Ref AlertFromEmail
        THRESHOLD_CONFIG_PARAM: !Ref ThresholdConfigParam
        EMERGENCY_AGENCY: !Ref EmergencyAgency
        VERIFICATION_SES_REGION: ap-southeast-5
        ALERT_COOLDOWN_SECONDS: !Ref AlertCooldownSeconds
        EMAIL_COOLDOWN_SECONDS: !Ref EmailCooldownSeconds
        OFFLINE_WINDOW_SECONDS: !Ref OfflineWindowSeconds
        INCIDENT_STATUS_UPDATED_AT_INDEX_NAME: StatusUpdatedAtIndex
        INCIDENT_CORRELATION_STATUS_INDEX_NAME: CorrelationStatusIndex

Resources:
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-User-Id,X-User-Role'"
        AllowOrigin: "'*'"

  SendRegisterCodeFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/sendRegisterCode.handler
      CodeUri: ./
      Events:
        SendRegisterCode:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/auth/send-code
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VerificationCodeTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: "*"

  RegisterUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/registerUser.handler
      CodeUri: ./
      Events:
        RegisterUser:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/auth/register
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VerificationCodeTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuthUserTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserProfileTable

  LoginUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/loginUser.handler
      CodeUri: ./
      Events:
        LoginUser:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/auth/login
            Method: post
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AuthUserTable

  ResetPasswordFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/resetPassword.handler
      CodeUri: ./
      Events:
        ResetPassword:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/auth/reset-password
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VerificationCodeTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuthUserTable

  GetReadingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getReadings.handler
      CodeUri: ./
      Events:
        GetReadings:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/readings/latest
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SensorTable

  GetDashboardOverviewFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getDashboardOverview.handler
      CodeUri: ./
      Events:
        GetDashboardOverview:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/v1/dashboard/overview
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SensorTable
        - DynamoDBReadPolicy:
            TableName: !Ref IncidentTable

  GetAppBootstrapFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getAppBootstrap.handler
      CodeUri: ./
      Events:
        GetAppBootstrap:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/app/bootstrap
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SensorTable
        - DynamoDBReadPolicy:
            TableName: !Ref IncidentTable
        - DynamoDBReadPolicy:
            TableName: !Ref WorkOrderTable
        - DynamoDBReadPolicy:
            TableName: !Ref UserProfileTable
        - DynamoDBReadPolicy:
            TableName: !Ref SettingsTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: "*"

  GetTrendsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getTrends.handler
      CodeUri: ./
      Events:
        GetTrends:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/trends
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SensorTable

  GetAlertsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getAlerts.handler
      CodeUri: ./
      Events:
        GetAlerts:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/alerts
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref IncidentTable

  GetActiveIncidentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getActiveIncidents.handler
      CodeUri: ./
      Events:
        GetActiveIncidents:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/v1/incidents/active
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref IncidentTable

  GetIncidentEventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getIncidentEvents.handler
      CodeUri: ./
      Events:
        GetIncidentEvents:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/v1/incidents/{incidentId}/events
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SensorEventTable

  GetWorkOrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getWorkOrders.handler
      CodeUri: ./
      Events:
        GetWorkOrders:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/work-orders
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref WorkOrderTable

  UpdateAlertStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/updateAlertStatus.handler
      CodeUri: ./
      Events:
        UpdateAlertStatus:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/alerts/{alertId}/status
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable

  AcknowledgeIncidentFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/acknowledgeIncident.handler
      CodeUri: ./
      Events:
        AcknowledgeIncident:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/v1/incidents/{incidentId}/acknowledge
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable

  ResolveIncidentFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/resolveIncident.handler
      CodeUri: ./
      Events:
        ResolveIncident:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/v1/incidents/{incidentId}/resolve
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable

  CreateWorkOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/createWorkOrder.handler
      CodeUri: ./
      Events:
        CreateWorkOrder:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/alerts/{alertId}/work-orders
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkOrderTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable

  RegisterPushTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/registerPushToken.handler
      CodeUri: ./
      Events:
        RegisterPushToken:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/push/register-token
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PushTokenTable

  GetBuzzerStateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getBuzzerState.handler
      CodeUri: ./
      Events:
        GetBuzzerState:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/device/buzzer/state
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SettingsTable

  SilenceBuzzerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/silenceBuzzer.handler
      CodeUri: ./
      Events:
        SilenceBuzzer:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/device/buzzer/silence
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable

  GetNotificationSettingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getNotificationSettings.handler
      CodeUri: ./
      Events:
        GetNotificationSettings:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/settings/notifications
            Method: get
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserProfileTable

  UpdateNotificationSettingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/updateNotificationSettings.handler
      CodeUri: ./
      Events:
        UpdateNotificationSettings:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/settings/notifications
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserProfileTable
        - Statement:
            - Effect: Allow
              Action:
                - sns:Subscribe
                - sns:Unsubscribe
              Resource:
                - !Ref AlertCriticalTopic
                - !Ref AlertWarningTopic
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: "*"

  GetSystemSettingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getSystemSettings.handler
      CodeUri: ./
      Events:
        GetSystemSettings:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/settings/system
            Method: get
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable

  UpdateSystemSettingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/updateSystemSettings.handler
      CodeUri: ./
      Events:
        UpdateSystemSettings:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/settings/system
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable

  GetDeviceLocationFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getDeviceLocation.handler
      CodeUri: ./
      Events:
        GetDeviceLocation:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/settings/device-location
            Method: get
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable

  UpdateDeviceLocationFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/updateDeviceLocation.handler
      CodeUri: ./
      Events:
        UpdateDeviceLocation:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/settings/device-location
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable

  GetAdminDevicesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getAdminDevices.handler
      CodeUri: ./
      Events:
        GetAdminDevices:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/admin/devices
            Method: get
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable
        - DynamoDBReadPolicy:
            TableName: !Ref SensorTable

  MutateAdminDeviceFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/mutateAdminDevice.handler
      CodeUri: ./
      Events:
        MutateAdminDevice:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/admin/devices
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable

  GetAdminsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getAdmins.handler
      CodeUri: ./
      Events:
        GetAdmins:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/admins
            Method: get
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AdminTable

  CreateAdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/createAdmin.handler
      CodeUri: ./
      Events:
        CreateAdmin:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/admins
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AdminTable

  UpdateAdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/updateAdmin.handler
      CodeUri: ./
      Events:
        UpdateAdmin:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/admins/{adminId}
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AdminTable

  DeleteAdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/deleteAdmin.handler
      CodeUri: ./
      Events:
        DeleteAdmin:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/admins/{adminId}
            Method: delete
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AdminTable

  SetAdminStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/setAdminStatus.handler
      CodeUri: ./
      Events:
        SetAdminStatus:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/admins/{adminId}/status
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AdminTable

  IngestSensorDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/ingestSensorData.handler
      CodeUri: ./
      Environment:
        Variables:
          FIREBASE_SERVICE_ACCOUNT_PARAM: !Ref FirebaseServiceAccountParamName
      Events:
        IngestSensorData:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/sensors/ingest
            Method: post
        IngestSensorDataFromIoT:
          Type: IoTRule
          Properties:
            Sql: !Sub "SELECT * FROM '${IoTSensorTopic}'"
            AwsIotSqlVersion: "2016-03-23"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SensorTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AlertTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SensorEventTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PushTokenTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable
        - DynamoDBReadPolicy:
            TableName: !Ref AdminTable
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:BatchGetItem
                - dynamodb:Query
                - dynamodb:Scan
                - dynamodb:DescribeTable
              Resource:
                - !GetAtt UserProfileTable.Arn
                - !Sub "arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${UserProfileTable}/index/*"
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - sns:Publish
              Resource: "*"

  SendTestAlertFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/sendTestAlert.handler
      CodeUri: ./
      Environment:
        Variables:
          FIREBASE_SERVICE_ACCOUNT_PARAM: !Ref FirebaseServiceAccountParamName
      Events:
        SendTestAlert:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /api/push/test-alert
            Method: post
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PushTokenTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: "*"

  SensorTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      TableName: alertrix-sensor-readings-my
      AttributeDefinitions:
        - AttributeName: sensorType
          AttributeType: S
        - AttributeName: capturedAt
          AttributeType: S
      KeySchema:
        - AttributeName: sensorType
          KeyType: HASH
        - AttributeName: capturedAt
          KeyType: RANGE

  AlertTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      TableName: alertrix-alerts-my
      AttributeDefinitions:
        - AttributeName: alertId
          AttributeType: S
      KeySchema:
        - AttributeName: alertId
          KeyType: HASH

  IncidentTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      TableName: alertrix-incidents-my
      AttributeDefinitions:
        - AttributeName: incidentId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: statusUpdatedAt
          AttributeType: S
        - AttributeName: correlationKey
          AttributeType: S
      KeySchema:
        - AttributeName: incidentId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: StatusUpdatedAtIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: statusUpdatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: CorrelationStatusIndex
          KeySchema:
            - AttributeName: correlationKey
              KeyType: HASH
            - AttributeName: statusUpdatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  SensorEventTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      TableName: alertrix-sensor-events-my
      AttributeDefinitions:
        - AttributeName: incidentId
          AttributeType: S
        - AttributeName: eventAt
          AttributeType: S
      KeySchema:
        - AttributeName: incidentId
          KeyType: HASH
        - AttributeName: eventAt
          KeyType: RANGE

  WorkOrderTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      TableName: alertrix-work-orders-my
      AttributeDefinitions:
        - AttributeName: workOrderId
          AttributeType: S
      KeySchema:
        - AttributeName: workOrderId
          KeyType: HASH

  PushTokenTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      TableName: alertrix-push-tokens-my
      AttributeDefinitions:
        - AttributeName: token
          AttributeType: S
      KeySchema:
        - AttributeName: token
          KeyType: HASH

  SettingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      TableName: alertrix-settings-my
      AttributeDefinitions:
        - AttributeName: settingId
          AttributeType: S
      KeySchema:
        - AttributeName: settingId
          KeyType: HASH

  UserProfileTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      TableName: alertrix-user-profiles-my
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  AdminTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      TableName: alertrix-admins-my
      AttributeDefinitions:
        - AttributeName: adminId
          AttributeType: S
      KeySchema:
        - AttributeName: adminId
          KeyType: HASH

  AuthUserTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      TableName: alertrix-auth-users-my
      AttributeDefinitions:
        - AttributeName: username
          AttributeType: S
      KeySchema:
        - AttributeName: username
          KeyType: HASH

  VerificationCodeTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      TableName: alertrix-verification-codes-my
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  AlertCriticalTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: alertrix-alert-critical-my

  AlertWarningTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: alertrix-alert-warning-my

  HeartbeatTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: alertrix-device-heartbeat-my

  FirebaseServiceAccountParameter:
    Type: AWS::SSM::Parameter
    Condition: HasFirebaseServiceAccountB64
    Properties:
      Name: !Ref FirebaseServiceAccountParamName
      Type: String
      Value: !Ref FirebaseServiceAccountJsonBase64
      Description: Base64-encoded Firebase service account JSON for FCM push initialization.

Outputs:
  ApiBaseUrl:
    Description: API Gateway base URL
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod"
  HeartbeatTopicArn:
    Description: SNS topic for heartbeat events
    Value: !Ref HeartbeatTopic

